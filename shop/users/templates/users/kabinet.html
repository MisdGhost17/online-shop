{% extends 'products/base.html' %}
{% block content %}
    {% if messages %}
    <ul class="messages">
        {% for message in messages %}
            <li class="{{ message.tags }}">
                {{ message }}
            </li>
        {% endfor %}
    </ul>
{% endif %}
    <form enctype="multipart/form-data" method="post">
        {% csrf_token %}
        <img src="{{ user.image.url }}">
        <p>{{ form.image }}</p>
        <p>{{ form.username }}</p>
        <p>{{ form.email }}</p>
        <p>{{ form.first_name }}</p>
        <p>{{ form.last_name }}</p>
        <button type="submit">Подтвердить</button>
    </form>
{% endblock %}
